<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F5F4EF;--surface:#FFFFFF;--ink:#1C1C1A;--ink-soft:#6B675E;--line:#DEDACE;
  --navy:#173A5E;--navy-dark:#0F2740;--green:#1C7C4B;--green-dark:#145C38;
  --amber:#D9730D;--amber-dark:#B25A06;--red:#B3261E;--red-soft:#F6E4E2;--gold:#B08D3E;
  --radius:14px;
  --font-display:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  --font-body:'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;
  --font-mono:'JetBrains Mono','SF Mono',monospace;
}
body.dark{
  --bg:#14151A;--surface:#1E2027;--ink:#ECEAE4;--ink-soft:#9A968C;--line:#33363F;
  --red-soft:#3A2224;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;transition:background .2s;}
#root{min-height:100vh;display:flex;flex-direction:column;}
.wrap{max-width:960px;margin:0 auto;width:100%;padding:16px;}
.topbar{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700;}
.brand .mark{height:30px;padding:0 9px;border-radius:8px;background:linear-gradient(135deg,var(--amber),var(--gold));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:#1C1C1A;font-size:13px;white-space:nowrap;}
.topbar .userinfo{font-size:13px;opacity:.9;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn{border:none;border-radius:10px;padding:10px 16px;font-family:var(--font-body);font-weight:700;font-size:14px;cursor:pointer;transition:transform .08s;}
.btn:active{transform:scale(.97);}
.btn-ghost{background:rgba(255,255,255,.12);color:#fff;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-line{background:transparent;color:var(--navy);border:1.5px solid var(--line);}
body.dark .btn-line{color:var(--ink);}
.btn-red{background:var(--red-soft);color:var(--red);}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:8px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px;overflow-x:auto;}
.tab{padding:10px 12px;font-weight:700;font-size:13px;color:var(--ink-soft);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.tab.active{color:var(--navy);border-color:var(--amber);}
body.dark .tab.active{color:var(--ink);}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
h1,h2,h3{font-family:var(--font-display);margin:0 0 8px;}
h2{font-size:19px;}h3{font-size:15px;color:var(--ink-soft);font-weight:700;}
label{display:block;font-size:12.5px;color:var(--ink-soft);font-weight:700;margin:12px 0 5px;}
input,textarea,select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14.5px;font-family:var(--font-body);background:var(--surface);color:var(--ink);}
input:focus,textarea:focus,select:focus{outline:2px solid var(--navy);border-color:var(--navy);}
.hint{font-size:12px;color:var(--ink-soft);margin-top:4px;}
.error-box{background:var(--red-soft);color:var(--red);border-radius:9px;padding:10px 12px;font-size:13px;font-weight:600;margin-top:10px;}
.warn-box{background:#FBEFD9;color:#8A6414;border-radius:9px;padding:10px 12px;font-size:13px;font-weight:600;margin-bottom:14px;}
body.dark .warn-box{background:#3A2E10;color:#F0C97A;}
.center-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{max-width:420px;width:100%;}
.auth-tabs{display:flex;background:#EFEDE5;border-radius:10px;padding:4px;margin-bottom:18px;}
body.dark .auth-tabs{background:#2A2C34;}
.auth-tab{flex:1;text-align:center;padding:9px;border-radius:7px;font-weight:700;font-size:13.5px;cursor:pointer;color:var(--ink-soft);}
.auth-tab.active{background:var(--surface);color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.08);}
body.dark .auth-tab.active{color:var(--ink);}
.instrument{background:var(--navy-dark);border-radius:16px;padding:22px 20px;color:#fff;text-align:center;margin-bottom:18px;}
.instrument .clock{font-family:var(--font-mono);font-size:44px;font-weight:700;color:#F4D58D;}
.instrument .date{font-family:var(--font-mono);font-size:13px;color:#9FB4C8;margin-top:4px;}
.instrument .status{margin-top:10px;font-size:13px;font-weight:700;padding:5px 12px;border-radius:20px;display:inline-block;}
.status-in{background:rgba(28,124,75,.25);color:#7FE0AB;}
.status-out{background:rgba(217,115,13,.22);color:#F5B26B;}
.status-break{background:rgba(180,180,60,.25);color:#E8E07A;}
.offline-bar{background:#7B4F00;color:#FFE0A0;text-align:center;font-size:12.5px;font-weight:700;padding:7px;position:sticky;top:58px;z-index:19;}
.punch-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px;}
.punch-btn{border:none;border-radius:16px;padding:30px 10px;font-family:var(--font-display);font-size:22px;font-weight:900;color:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;}
.punch-btn:active{transform:scale(.96);}
.punch-btn .sub{font-family:var(--font-mono);font-size:12px;opacity:.85;}
.punch-in{background:linear-gradient(160deg,var(--green),var(--green-dark));}
.punch-out{background:linear-gradient(160deg,var(--amber),var(--amber-dark));}
.break-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.break-btn{border:1.5px solid var(--line);background:var(--surface);color:var(--ink-soft);border-radius:12px;padding:12px;font-weight:700;font-size:14px;cursor:pointer;}
.reserve-card{background:linear-gradient(135deg,#1A2E45,#0F2740);border-radius:12px;padding:14px 16px;margin-bottom:18px;color:#fff;}
.reserve-card .rc-label{font-size:11px;color:#9FB4C8;font-weight:700;margin-bottom:6px;}
.reserve-card .rc-item{display:flex;justify-content:space-between;align-items:center;font-size:14px;margin-top:6px;}
.rc-type{font-size:12px;padding:3px 8px;border-radius:12px;}
.rc-in{background:rgba(28,124,75,.3);color:#7FE0AB;}
.rc-out{background:rgba(217,115,13,.3);color:#F5B26B;}
.rec-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);font-size:14px;}
.rec-row:last-child{border-bottom:none;}
.rec-left{display:flex;align-items:center;gap:10px;}
.dot{width:9px;height:9px;border-radius:50%;}
.dot-in{background:var(--green);}
.dot-out{background:var(--amber);}
.dot-break{background:#B8B03C;}
.rec-time{font-family:var(--font-mono);font-weight:700;}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.badge-pending{background:#FBEFD9;color:#8A6414;}
.badge-approved{background:#DCF0E3;color:var(--green-dark);}
.badge-rejected{background:var(--red-soft);color:var(--red);}
.badge-confirmed{background:#E5ECF3;color:var(--navy);}
body.dark .badge-confirmed{background:#28374A;color:#9FC1E8;}
.badge-offline{background:#3A2800;color:#FFD080;}
.badge-lock{background:#E8E5DC;color:#6B675E;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy-dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:100;opacity:0;transition:opacity .25s;pointer-events:none;display:flex;gap:12px;align-items:center;}
.toast.show{opacity:1;pointer-events:auto;}
.toast button{background:var(--amber);border:none;color:#fff;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer;}
.modal-bg{position:fixed;inset:0;background:rgba(20,20,18,.5);display:flex;align-items:center;justify-content:center;z-index:60;padding:16px;}
.modal{background:var(--surface);border-radius:var(--radius);padding:22px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto;}
.terms-body{font-size:13.5px;line-height:1.9;color:var(--ink-soft);max-height:50vh;overflow-y:auto;}
.terms-body h4{color:var(--ink);font-size:14px;margin:14px 0 4px;}
.checkline{display:flex;align-items:flex-start;gap:8px;margin-top:14px;font-size:13px;}
.checkline input{width:auto;margin-top:3px;}
table{width:100%;border-collapse:collapse;font-size:12.8px;}
th{text-align:left;font-size:11px;color:var(--ink-soft);padding:8px 4px;border-bottom:1.5px solid var(--line);}
td{padding:8px 4px;border-bottom:1px solid var(--line);font-family:var(--font-mono);font-size:12.2px;}
.gps-link{color:var(--navy);font-weight:700;text-decoration:none;}
body.dark .gps-link{color:#9FC1E8;}
.empty{text-align:center;color:var(--ink-soft);font-size:13.5px;padding:26px 10px;}
.user-list-item{display:flex;justify-content:space-between;align-items:center;padding:13px 4px;border-bottom:1px solid var(--line);gap:8px;flex-wrap:wrap;}
.footer-link{text-align:center;padding:14px;font-size:12px;color:var(--ink-soft);}
.footer-link a{color:var(--navy);cursor:pointer;font-weight:700;}
body.dark .footer-link a{color:#9FC1E8;}
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.month-nav button.nav{background:none;border:1.5px solid var(--line);border-radius:8px;padding:6px 14px;cursor:pointer;font-weight:700;color:var(--ink);}
.month-nav span{font-family:var(--font-display);font-weight:700;font-size:16px;}
.presence-item{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid var(--line);}
.row-miss{color:var(--red)!important;}
.row-holiday{color:#1a8f3c;}
@media(max-width:520px){
  .instrument .clock{font-size:34px;}
  .punch-btn{padding:24px 8px;font-size:18px;}

</style>

<body>
<div id="root"></div>
<div id="toast" class="toast"></div>
<script>
/* ===== バージョン / SW ===== */
const APP_VERSION='2.0.0';
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='dezura-${APP_VERSION}';
self.addEventListener('install',e=>{self.skipWaiting();e.waitUntil(caches.open(CACHE).then(c=>c.addAll([location.pathname])));});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('supabase.co')||e.request.method!=='GET'){e.respondWith(fetch(e.request));return;}
  e.respondWith(fetch(e.request).then(res=>{const cl=res.clone();caches.open(CACHE).then(c=>c.put(e.request,cl));return res;}).catch(()=>caches.match(e.request)));
});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode],{type:'application/javascript'}))).catch(()=>{});
}
/* PWA manifest */
try{
  const mf={name:'でずら！勤怠管理',short_name:'でずら！',display:'standalone',start_url:'.',background_color:'#F5F4EF',theme_color:'#173A5E'};
  const l=document.createElement('link');l.rel='manifest';
  l.href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/json'}));
  document.head.appendChild(l);
}catch(e){}
/* ダークモード */
if(localStorage.getItem('dezura_dark')==='1')document.body.classList.add('dark');
function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('dezura_dark',document.body.classList.contains('dark')?'1':'0');}

/* ===== Supabase ===== */
const SB_URL='https://fzgvrropxbsxoffukhax.supabase.co';
const SB_KEY='sb_publishable_aGGnCru9be1hgd7L5-RWQg_bYdaIiNR';
/* ===== 認証（Supabase Auth） ===== */
const AUTH_KEY='dezura_auth';
function authGet(){try{return JSON.parse(localStorage.getItem(AUTH_KEY)||'null');}catch(e){return null;}}
function authSave(a){localStorage.setItem(AUTH_KEY,JSON.stringify(a));}
function authClear(){localStorage.removeItem(AUTH_KEY);}
async function authLogin(email,password){
  const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},body:JSON.stringify({email,password})});
  const d=await r.json().catch(()=>({}));
  if(!r.ok)return{error:'メールアドレスまたはパスワードが違います。'};
  authSave({at:d.access_token,rt:d.refresh_token,exp:Date.now()+(d.expires_in-60)*1000});
  return{ok:true};
}
async function authRefresh(){
  const a=authGet();if(!a||!a.rt)return null;
  try{
    const r=await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},body:JSON.stringify({refresh_token:a.rt})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok){authClear();return null;}
    authSave({at:d.access_token,rt:d.refresh_token,exp:Date.now()+(d.expires_in-60)*1000});
    return d.access_token;
  }catch(e){return a.at;/* オフライン時は既存トークンで続行 */}
}
async function getToken(){
  const a=authGet();if(!a)return null;
  if(Date.now()<a.exp)return a.at;
  return await authRefresh();
}
function forceLogout(){authClear();clearSession();state.view='login';state.currentUser=null;state.isAdmin=false;try{stopPoll();}catch(e){}render();}
async function sbFetch(path,method='GET',body=null,extraHeaders={}){
  const tk=await getToken();
  if(!tk){forceLogout();throw new Error('ログインが必要です。');}
  const opts={method,headers:Object.assign({'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+tk},extraHeaders)};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(SB_URL+'/rest/v1/'+path,opts);
  if(r.status===401){forceLogout();throw new Error('セッションの有効期限が切れました。再ログインしてください。');}
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=await r.text();return t?JSON.parse(t):[];
}
async function sbInsert(t,row){return sbFetch(t,'POST',row);}
async function sbUpsert(t,row){return sbFetch(t,'POST',row,{'Prefer':'resolution=merge-duplicates'});}
async function sbUpdate(t,f,patch){return sbFetch(t+'?'+f,'PATCH',patch);}

/* ===== 操作ログ ===== */
function logAudit(actor,action,target,detail){
  sbInsert('audit_logs',{id:genId(),actor,action,target:target||'',detail:detail||'',created_at:new Date().toISOString()}).catch(()=>{});
}

/* ===== オフラインキュー ===== */
const QUEUE_KEY='dezura_offline_queue';
function queueGet(){try{return JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]');}catch(e){return[];}}
function queueSave(q){localStorage.setItem(QUEUE_KEY,JSON.stringify(q));}
function queueAdd(item){const q=queueGet();q.push(item);queueSave(q);}
async function syncQueue(){
  const q=queueGet();if(!q.length)return;
  const failed=[];
  for(const item of q){try{await sbInsert(item.table,item.row);}catch(e){failed.push(item);}}
  queueSave(failed);
  if(failed.length<q.length)showToast('オフライン中の打刻を同期しました');
}
window.addEventListener('online',()=>{syncQueue();renderOfflineBar();});
window.addEventListener('offline',()=>renderOfflineBar());
function renderOfflineBar(){
  document.getElementById('offlineBar')?.remove();
  if(!navigator.onLine){
    const bar=document.createElement('div');
    bar.id='offlineBar';bar.className='offline-bar';
    bar.textContent='⚠ オフライン中 — 打刻はオンライン復帰後に自動送信されます';
    document.body.insertBefore(bar,document.getElementById('root').nextSibling);
  }
}

/* ===== ユーティリティ ===== */
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function p2(n){return String(n).padStart(2,'0');}
function fmtMin(min){return Math.floor(min/60)+'h'+p2(min%60)+'m';}
function fmtDateTime(iso){if(!iso)return'-';const d=new Date(iso);return d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes());}
function fmtTime(iso){if(!iso)return'-';const d=new Date(iso);return p2(d.getHours())+':'+p2(d.getMinutes());}
function fmtDate(iso){if(!iso)return'-';const d=new Date(iso);return d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate());}
function toDatetimeLocal(iso){const d=new Date(iso);return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())+'T'+p2(d.getHours())+':'+p2(d.getMinutes());}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function leaveLabel(t){return{paid_leave:'有給（全日）',paid_leave_am:'有給（午前）',paid_leave_pm:'有給（午後）',absence:'欠勤（全日）',absence_am:'欠勤（午前）',absence_pm:'欠勤（午後）'}[t]||t;}
function leaveDays(t){return(t==='paid_leave'||t==='absence')?1:0.5;}
function typeLabel(t){return{clock_in:'出勤',clock_out:'退勤',break_start:'休憩開始',break_end:'休憩終了'}[t]||t;}
function dotClass(t){return t==='clock_in'?'dot-in':t==='clock_out'?'dot-out':'dot-break';}
function showToast(msg){const t=document.getElementById('toast');t.innerHTML=escapeHtml(msg);t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2600);}
function showToastAction(msg,btnLabel,fn,ms){
  const t=document.getElementById('toast');
  t.innerHTML=escapeHtml(msg)+' <button id="toastActBtn">'+escapeHtml(btnLabel)+'</button>';
  t.classList.add('show');
  document.getElementById('toastActBtn').addEventListener('click',()=>{t.classList.remove('show');fn();});
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),ms||5000);
}
function getGPS(){return new Promise(resolve=>{if(!navigator.geolocation){resolve(null);return;}navigator.geolocation.getCurrentPosition(p=>resolve({lat:p.coords.latitude,lng:p.coords.longitude,accuracy:Math.round(p.coords.accuracy)}),()=>resolve(null),{enableHighAccuracy:true,timeout:8000,maximumAge:0});});}
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,rad=x=>x*Math.PI/180;
  const dLat=rad(lat2-lat1),dLng=rad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(rad(lat1))*Math.cos(rad(lat2))*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* ===== 祝日 ===== */
let holidayMap={};
async function loadHolidays(){
  try{
    const cached=JSON.parse(localStorage.getItem('dezura_holidays')||'null');
    if(cached&&Date.now()-cached.ts<30*86400000){holidayMap=cached.map;return;}
    const r=await fetch('https://holidays-jp.github.io/api/v1/date.json');
    holidayMap=await r.json();
    localStorage.setItem('dezura_holidays',JSON.stringify({ts:Date.now(),map:holidayMap}));
  }catch(e){}
}

/* ===== 休憩時間計算（設定から自動計算） ===== */
function parseBreakSettings(settings){
  // デフォルト: 12:00-13:00, 10:00-10:30, 15:00-15:30
  try{
    const s=settings.break_times;
    if(s)return JSON.parse(s);
  }catch(e){}
  return [{start:'10:00',end:'10:30'},{start:'12:00',end:'13:00'},{start:'15:00',end:'15:30'}];
}
function calcFixedBreakMin(inRec,outRec,breakTimes){
  if(!inRec||!outRec)return 0;
  const inT=new Date(inRec.timestamp);
  const outT=new Date(outRec.timestamp);
  const date=inT.toISOString().slice(0,10);
  let total=0;
  for(const b of breakTimes){
    const bs=new Date(date+'T'+b.start+':00');
    const be=new Date(date+'T'+b.end+':00');
    const os=Math.max(inT,bs);
    const oe=Math.min(outT,be);
    if(oe>os)total+=(oe-os)/60000;
  }
  return Math.round(total);
}
function nightMinutes(s,e){
  if(!s||!e||e<=s)return 0;
  let total=0,cur=new Date(s.getFullYear(),s.getMonth(),s.getDate());
  while(cur<e){
    const w=[[new Date(cur).setHours(0,0,0,0),new Date(cur).setHours(5,0,0,0)],[new Date(cur).setHours(22,0,0,0),new Date(cur).setHours(24,0,0,0)]];
    for(const[ws,we]of w){const os=Math.max(s,ws),oe=Math.min(e,we);if(oe>os)total+=(oe-os)/60000;}
    cur.setDate(cur.getDate()+1);
  }
  return Math.round(total);
}
function calcDayStats(dayRecs,breakTimes){
  const ins=dayRecs.filter(r=>r.type==='clock_in').sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  const outs=dayRecs.filter(r=>r.type==='clock_out').sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  const inRec=ins[0]||null,outRec=outs[outs.length-1]||null;
  let workMin=null,overMin=0,nightMin=0;
  const brMin=calcFixedBreakMin(inRec,outRec,breakTimes||[]);
  if(inRec&&outRec){
    const gross=Math.round((new Date(outRec.timestamp)-new Date(inRec.timestamp))/60000);
    workMin=Math.max(0,gross-brMin);
    overMin=Math.max(0,workMin-480);
    nightMin=nightMinutes(new Date(inRec.timestamp),new Date(outRec.timestamp));
  }
  return{inRec,outRec,workMin,brMin,overMin,nightMin};
}

async function loginUser(email,password){
  const a=await authLogin(email,password);
  if(a.error)return{error:a.error};
  try{
    let rows=await sbFetch('users?email=eq.'+encodeURIComponent(email)+'&select=email,name,disabled,is_admin');
    if(!rows.length){
      await sbInsert('users',{email,name:email.split('@')[0],pass:'(supabase-auth)',created_at:new Date().toISOString()});
      rows=await sbFetch('users?email=eq.'+encodeURIComponent(email)+'&select=email,name,disabled,is_admin');
    }
    if(rows[0].disabled){authClear();return{error:'このアカウントは無効化されています。管理者にお問い合わせください。'};}
    return{ok:true,user:{email:rows[0].email,name:rows[0].name,isAdmin:!!rows[0].is_admin}};
  }catch(e){authClear();return{error:'ログインエラー: '+e.message};}
}
async function punch(email,type,site){
  const needGps=(type==='clock_in'||type==='clock_out');
  const gps=needGps?await getGPS():null;
  const row={id:genId(),email,type,timestamp:new Date().toISOString(),gps_lat:gps?gps.lat:null,gps_lng:gps?gps.lng:null,gps_accuracy:gps?gps.accuracy:null,corrected:false,deleted:false,site:site||null};
  if(navigator.onLine){await sbInsert('attendance',row);}
  else{queueAdd({table:'attendance',row});}
  return row;
}

  const reservations=await getReservations(email);
  const now=new Date();
  const pending=reservations.filter(r=>!r.processed&&new Date(r.scheduled_time)<=now);
  for(const r of pending){
    try{
      const gps=await getGPS();
      const row={id:genId(),email,type:r.type,timestamp:r.scheduled_time,gps_lat:gps?gps.lat:null,gps_lng:gps?gps.lng:null,gps_accuracy:gps?gps.accuracy:null,corrected:false,deleted:false,from_reservation:true,site:null};
      await sbInsert('attendance',row);
      await sbUpdate('reservations','id=eq.'+r.id,{processed:true});
      showToast(typeLabel(r.type)+'予約を自動打刻しました '+fmtTime(r.scheduled_time));
    }catch(e){}
  }
}

/* ===== イベント ===== */
const FAIL_KEY='dezura_fail';
function failGet(){try{return JSON.parse(localStorage.getItem(FAIL_KEY)||'{"n":0,"until":0}');}catch(e){return{n:0,until:0};}}
function failSave(f){localStorage.setItem(FAIL_KEY,JSON.stringify(f));}

function attachHandlers(){
  ['openTermsLink','openTermsLink3'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('click',openTermsModal);});
  const darkBtn=document.getElementById('darkBtn');
  if(darkBtn)darkBtn.addEventListener('click',toggleDark);

  if(state.view==='login'){
    document.querySelectorAll('[data-authtab]').forEach(el=>el.addEventListener('click',()=>{authTab=el.getAttribute('data-authtab');render();}));
    const loginBtn=document.getElementById('loginBtn');
    if(loginBtn)loginBtn.addEventListener('click',async()=>{
      const f=failGet();
      if(f.until>Date.now()){showAuthErr('試行回数超過。'+Math.ceil((f.until-Date.now())/1000)+'秒後に再試行してください。');return;}
      const email=document.getElementById('loginEmail').value.trim();
      const pass=document.getElementById('loginPass').value;
      if(!email||!pass){showAuthErr('入力してください。');return;}
      loginBtn.disabled=true;loginBtn.textContent='確認中...';
      const r=await loginUser(email,pass);
      loginBtn.disabled=false;loginBtn.textContent='ログイン';
      if(r.error){
        const nf={n:f.n+1,until:0};
        if(nf.n>=5){nf.until=Date.now()+60000;nf.n=0;}
        failSave(nf);
        showAuthErr(r.error);
      }
      else{failSave({n:0,until:0});state.view='user';state.currentUser=r.user;state.userTab='punch';saveSession(r.user);render();mountUserTab();autoProcessReservations(r.user.email);}
    });
    const adminBtn=document.getElementById('adminLoginBtn');
    if(adminBtn)adminBtn.addEventListener('click',async()=>{
      const f=failGet();
      if(f.until>Date.now()){showAuthErr('試行回数超過。'+Math.ceil((f.until-Date.now())/1000)+'秒後に再試行してください。');return;}
      const email=document.getElementById('adminEmail').value.trim();
      const pass=document.getElementById('adminPass').value;
      if(!email||!pass){showAuthErr('入力してください。');return;}
      adminBtn.disabled=true;adminBtn.textContent='確認中...';
      const r=await loginUser(email,pass);
      adminBtn.disabled=false;adminBtn.textContent='管理者としてログイン';
      if(r.error){
        const nf={n:f.n+1,until:0};
        if(nf.n>=5){nf.until=Date.now()+60000;nf.n=0;}
        failSave(nf);
        showAuthErr(r.error);return;
      }
      if(!r.user.isAdmin){authClear();showAuthErr('このアカウントには管理者権限がありません。');return;}
      failSave({n:0,until:0});
      state.view='admin';state.isAdmin=true;state.adminTab='presence';state.currentUser=r.user;render();startPoll();
    });
  }
  if(state.view==='user'){
    document.getElementById('logoutBtn').addEventListener('click',()=>{stopPoll();clearSession();authClear();state.view='login';state.currentUser=null;render();});
    document.querySelectorAll('[data-utab]').forEach(el=>el.addEventListener('click',()=>{state.userTab=el.getAttribute('data-utab');state.histLimit=30;render();mountUserTab();}));
    mountUserTab();
  }
  if(state.view==='admin'){
    document.getElementById('adminLogoutBtn').addEventListener('click',()=>{stopPoll();clearSession();authClear();state.view='login';state.isAdmin=false;state.currentUser=null;render();});
    document.getElementById('adminRefreshBtn').addEventListener('click',()=>mountAdminTab());
    document.querySelectorAll('[data-atab]').forEach(el=>el.addEventListener('click',()=>{state.adminTab=el.getAttribute('data-atab');render();}));
    mountAdminTab();
  }
}

        <label>予定日時</label><input id="resTime" type="datetime-local">
        <label>理由（必須）</label><textarea id="resReason" rows="2" placeholder="例：通院のため"></textarea>

        ${upcoming.length?`<h3 style="margin-bottom:8px;">今後の予定</h3>`+upcoming.map(r=>`<div class="rec-row">
          <div><div><span class="badge ${r.type==='clock_in'?'badge-approved':'badge-pending'}">${typeLabel(r.type)}</span> ${fmtDateTime(r.scheduled_time)}</div>${r.reason?`<div class="hint">${escapeHtml(r.reason)}</div>`:''}</div>
          <button class="btn btn-line btn-sm" data-delres="${r.id}">削除</button>
        </div>`).join(''):''}
        ${past.length?`<h3 style="margin:12px 0 8px;">過去の予約</h3>`+past.slice(0,5).map(r=>`<div class="rec-row" style="opacity:.6;">
          <div><span class="badge ${r.type==='clock_in'?'badge-approved':'badge-pending'}">${typeLabel(r.type)}</span> ${fmtDateTime(r.scheduled_time)}${r.reason?' '+escapeHtml(r.reason):''} ${r.processed?'<span class="badge badge-confirmed">打刻済</span>':''}</div>
        </div>`).join(''):''}
        ${!upcoming.length&&!past.length?'<div class="empty">予約はありません</div>':''}
      </div>`;
    document.getElementById('resSubmit').addEventListener('click',async()=>{
      const type=document.getElementById('resType').value;
      const time=document.getElementById('resTime').value;
      const reason=document.getElementById('resReason').value.trim();
      if(!time||!reason){showToast('日時と理由を入力してください');return;}
      await submitReservation(email,type,new Date(time).toISOString(),reason);
      await autoProcessReservations(email);
      showToast('予約を登録しました');mountUserTab();
    });
    document.querySelectorAll('[data-delres]').forEach(btn=>btn.addEventListener('click',async()=>{
      if(!confirm('この予約を削除しますか？'))return;
      await deleteReservation(btn.getAttribute('data-delres'));
      showToast('削除しました');mountUserTab();
    }));
  }
  else if(state.userTab==='leave'){
    const [requests,users,allApproved]=await Promise.all([getLeaveRequests(email),getAllUsers(),getApprovedLeaves()]);
    const me=users.find(u=>u.email===email)||{};
    const total=Number(me.paid_leave_total||10);
    const thisYear=new Date().getFullYear();
    const used=requests.filter(r=>r.status==='approved'&&r.type.startsWith('paid_leave')&&r.date&&r.date.startsWith(String(thisYear))).reduce((s,r)=>s+leaveDays(r.type),0);
    const remain=total-used;
    // 今月のチーム休暇
    const ymNow=new Date().getFullYear()+'-'+p2(new Date().getMonth()+1);
    const um=Object.fromEntries(users.map(u=>[u.email,u.name]));
    const teamLeaves=allApproved.filter(r=>r.date&&r.date.startsWith(ymNow)).sort((a,b)=>a.date.localeCompare(b.date));

      <div class="card" style="display:flex;justify-content:space-between;align-items:center;">
        <div><h3 style="margin:0;">有給残日数（${thisYear}年）</h3><div class="hint">付与 ${total}日 / 取得 ${used}日</div></div>
        <div style="font-family:var(--font-mono);font-size:28px;font-weight:700;color:${remain<=0?'var(--red)':'var(--green)'};">${remain}日</div>
      </div>
      <div class="card"><h2>有給申請・欠勤連絡</h2>
        <label>種別</label>
        <select id="leaveType">
          <option value="paid_leave">有給申請（全日）</option>
          <option value="paid_leave_am">有給申請（午前半日）</option>
          <option value="paid_leave_pm">有給申請（午後半日）</option>
          <option value="absence">欠勤連絡（全日）</option>
          <option value="absence_am">欠勤連絡（午前半日）</option>
          <option value="absence_pm">欠勤連絡（午後半日）</option>
        </select>
        <label>対象日</label><input id="leaveDate" type="date">
        <label>理由</label><textarea id="leaveReason" rows="3" placeholder="例：私用のため / 体調不良のため"></textarea>
        <button class="btn btn-navy" id="leaveSubmit" style="width:100%;margin-top:14px;">申請・連絡する</button>
      </div>
      <div class="card"><h2>申請・連絡の状況</h2>
        ${requests.length?requests.map(r=>`<div class="rec-row">
          <div><div><span class="badge ${r.type.startsWith('paid_leave')?'badge-confirmed':'badge-pending'}" style="margin-right:6px;">${leaveLabel(r.type)}</span>${r.date}</div>
            <div class="hint">理由：${escapeHtml(r.reason)}</div>
            ${r.status==='rejected'&&r.admin_note?`<div class="hint">却下理由：${escapeHtml(r.admin_note)}</div>`:''}
          </div>
          <div style="text-align:right;">
            <span class="badge badge-${r.status==='pending'?'pending':r.status==='approved'?'approved':r.status==='cancel_pending'?'pending':'rejected'}">${r.status==='pending'?'審査中':r.status==='approved'?'承認':r.status==='cancel_pending'?'取消申請中':'却下'}</span>
            ${r.status==='approved'?`<div style="margin-top:6px;"><button class="btn btn-red btn-sm" data-cancelleave="${r.id}">取り消し申請</button></div>`:''}

        </div>`).join(''):'<div class="empty">申請・連絡はありません</div>'}

      <div class="card"><h2>今月の休暇（全員）</h2>
        ${teamLeaves.length?teamLeaves.map(r=>`<div class="rec-row"><div>${r.date.slice(5).replace('-','/')} ${escapeHtml(um[r.email]||r.email)}</div><span class="badge ${r.type.startsWith('paid_leave')?'badge-confirmed':'badge-rejected'}">${leaveLabel(r.type)}</span></div>`).join(''):'<div class="empty">今月の休暇はありません</div>'}

    document.getElementById('leaveSubmit').addEventListener('click',async()=>{

      showToast('送信しました');mountUserTab();
    });
    document.querySelectorAll('[data-cancelleave]').forEach(btn=>btn.addEventListener('click',async()=>{
      if(!confirm('取り消しを申請しますか？管理者が承認すると取り消されます。'))return;
      await sbUpdate('leave_requests','id=eq.'+btn.getAttribute('data-cancelleave'),{status:'cancel_pending'});
      showToast('取り消し申請を送信しました');mountUserTab();
    }));
  }
  else if(state.userTab==='kintai'){
    await loadHolidays();
    const vm=state.viewMonth;
    const y=vm.getFullYear(),m=vm.getMonth();
    const ym=y+'-'+p2(m+1);
    const [records,leaves,settings,closings]=await Promise.all([getAttendance(email),getLeaveRequests(email),getSettings(),getClosings()]);
    const breakTimes=parseBreakSettings(settings);
    const monthRecs=records.filter(r=>{const d=new Date(r.timestamp);return d.getFullYear()===y&&d.getMonth()===m;});
    const days=new Date(y,m+1,0).getDate();
    const wsStd=settings.work_start||'',weStd=settings.work_end||'';
    let rows='',totalWork=0,totalOver=0,totalNight=0,paidDays=0,absenceDays=0;
    const todayStart=new Date();todayStart.setHours(0,0,0,0);
    for(let d=1;d<=days;d++){
      const ds=y+'-'+p2(m+1)+'-'+p2(d);
      const dayStr=ds.replace(/-/g,'/');
      const dayRecs=monthRecs.filter(r=>fmtDate(r.timestamp)===dayStr);
      const s=calcDayStats(dayRecs,breakTimes);
      const leave=leaves.find(r=>r.date===ds&&r.status==='approved');
      if(s.workMin!=null){totalWork+=s.workMin;totalOver+=s.overMin;totalNight+=s.nightMin;}
      if(leave&&leave.type.startsWith('paid_leave'))paidDays+=leaveDays(leave.type);
      if(leave&&leave.type.startsWith('absence'))absenceDays+=leaveDays(leave.type);
      const wd=new Date(y,m,d).getDay();
      const wdStr=['日','月','火','水','木','金','土'][wd];
      const holiday=holidayMap[ds];
      const weekend=wd===0||wd===6;
      const dayColor=holiday?'color:#1a8f3c;font-weight:700;':wd===0?'color:#d43c3c;font-weight:700;':wd===6?'color:#2b6fd4;font-weight:700;':'';
      const dayDate=new Date(y,m,d);
      const miss=dayDate<todayStart&&!leave&&((s.inRec&&!s.outRec)||(!s.inRec&&s.outRec));
      // 遅刻早退
      let lateEarly='';
      if(wsStd&&s.inRec&&fmtTime(s.inRec.timestamp)>wsStd)lateEarly+='遅刻 ';
      if(weStd&&s.outRec&&fmtTime(s.outRec.timestamp)<weStd)lateEarly+='早退 ';
      const notes=[];
      if(s.overMin>0)notes.push('残業'+fmtMin(s.overMin));
      if(s.nightMin>0)notes.push('深夜'+fmtMin(s.nightMin));
      if(lateEarly)notes.push(lateEarly.trim());
      if(s.inRec&&s.inRec.site)notes.push('@'+s.inRec.site);
      if(miss)notes.push('打刻漏れ');
      if(holiday)notes.push(holiday);
      rows+=`<tr class="${miss?'row-miss':holiday?'row-holiday':''}" style="${weekend&&!holiday&&!miss?'color:var(--ink-soft);':''}">
        <td style="${dayColor}">${d}（${wdStr}）</td>
        <td>${s.inRec?fmtTime(s.inRec.timestamp):leave?'—':''}</td>
        <td>${s.outRec?fmtTime(s.outRec.timestamp):leave?'—':''}</td>
        <td>${s.brMin>0?fmtMin(s.brMin):''}</td>
        <td>${s.workMin!=null?fmtMin(s.workMin):leave?`<span class="badge ${leave.type.startsWith('paid_leave')?'badge-confirmed':'badge-rejected'}">${leaveLabel(leave.type)}</span>`:''}</td>
        <td style="font-size:10.5px;">${notes.join(' ')}</td>
      </tr>`;
    }
    const overWarn=totalOver>2700?`<div class="warn-box">⚠ 月間残業が45時間を超えています（36協定上限に注意）</div>`:'';
    body.innerHTML=`
      <div class="month-nav">
        <button class="nav" id="prevMonth">&#9664;</button>
        <span>${y}年${m+1}月 ${isClosed(closings,ym)?'<span class="badge badge-lock">🔒締め済</span>':''}</span>
        <button class="nav" id="nextMonth">&#9654;</button>
      </div>
      ${overWarn}
      <div class="card" style="padding:12px;">
        <div style="display:flex;gap:14px;margin-bottom:12px;font-size:12.5px;flex-wrap:wrap;">
          <span>実働：<strong>${fmtMin(totalWork)}</strong></span>
          <span style="${totalOver>2700?'color:var(--red);':''}">残業：<strong>${fmtMin(totalOver)}</strong></span>
          <span>深夜：<strong>${fmtMin(totalNight)}</strong></span>
          <span>有給：<strong>${paidDays}日</strong></span>
          <span>欠勤：<strong>${absenceDays}日</strong></span>
        </div>
        <table><thead><tr><th>日</th><th>出勤</th><th>退勤</th><th>休憩</th><th>実働</th><th>備考</th></tr></thead><tbody>${rows}</tbody></table>
      </div>`;
    document.getElementById('prevMonth').addEventListener('click',()=>{state.viewMonth=new Date(y,m-1,1);mountUserTab();});
    document.getElementById('nextMonth').addEventListener('click',()=>{state.viewMonth=new Date(y,m+1,1);mountUserTab();});
  }
}

async function doPunch(type){
  const btn=document.getElementById({clock_in:'punchIn',clock_out:'punchOut'}[type]);
  if(btn)btn.disabled=true;
  const siteSel=document.getElementById('siteSel');
  const site=siteSel?siteSel.value:null;
  if(site)localStorage.setItem('dezura_last_site',site);
  const rec=await punch(state.currentUser.email,type,site);
  if(navigator.onLine){
    showToastAction(typeLabel(type)+'を記録しました '+fmtTime(rec.timestamp),'取消',async()=>{
      await sbFetch('attendance?id=eq.'+rec.id,'DELETE');
      logAudit(state.currentUser.email,'undo_punch',rec.id,'');
      showToast('取り消しました');mountUserTab();
    },5000);
  }
  mountUserTab();
}

function tickClock(){
  function upd(){
    const el=document.getElementById('liveClock');const dl=document.getElementById('liveDate');
    if(!el){clearInterval(clockTimer);clockTimer=null;return;}
    const d=new Date();
    el.textContent=p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds());
    const days=['日','月','火','水','木','金','土'];
    dl.textContent=d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate())+'（'+days[d.getDay()]+'）';
  }
  upd();clockTimer=setInterval(upd,1000);
}

    body.innerHTML=`<div class="card"><h2>修正依頼一覧</h2>
      ${corrections.length?corrections.map(c=>`<div class="rec-row" style="align-items:flex-start;">
        <div><div><strong>${escapeHtml(um[c.email]||c.email)}</strong> ${typeLabel(c.type)}</div>
          <div class="hint">${fmtDateTime(c.old_time)} → ${fmtDateTime(c.requested_time)}</div>
          <div class="hint">理由：${escapeHtml(c.reason)}</div>
          ${c.status==='rejected'&&c.admin_note?`<div class="hint">却下：${escapeHtml(c.admin_note)}</div>`:''}
        </div>
        <div style="text-align:right;">
          <span class="badge badge-${c.status==='pending'?'pending':c.status==='approved'?'approved':'rejected'}">${c.status==='pending'?'審査中':c.status==='approved'?'承認済':'却下'}</span>
          ${c.status==='pending'?`<div style="margin-top:8px;display:flex;gap:6px;">
            <button class="btn btn-green btn-sm" data-approve="${c.id}|${c.record_id}|${c.requested_time}">承認</button>
            <button class="btn btn-line btn-sm" data-reject="${c.id}">却下</button>
          </div>`:''}
        </div></div>`).join(''):'<div class="empty">修正依頼はありません</div>'}
    </div>`;
    document.querySelectorAll('[data-approve]').forEach(btn=>btn.addEventListener('click',async()=>{
      const [id,recId,reqTime]=btn.getAttribute('data-approve').split('|');
      await approveCorrection(id,recId,reqTime);showToast('承認しました');mountAdminTab();
    }));
    document.querySelectorAll('[data-reject]').forEach(btn=>btn.addEventListener('click',async()=>{
      const note=prompt('却下理由（任意）')||'';
      await rejectCorrection(btn.getAttribute('data-reject'),note);showToast('却下しました');mountAdminTab();
    }));
  }
  else if(state.adminTab==='leave'){
    const [users,requests]=await Promise.all([getAllUsers(),getAllLeaveRequests()]);
    const um=Object.fromEntries(users.map(u=>[u.email,u.name]));
    body.innerHTML=`<div class="card"><h2>有給申請・欠勤連絡 一覧</h2>
      ${requests.length?requests.map(r=>`<div class="rec-row" style="align-items:flex-start;">
        <div><div><strong>${escapeHtml(um[r.email]||r.email)}</strong> <span class="badge ${r.type.startsWith('paid_leave')?'badge-confirmed':'badge-pending'}">${leaveLabel(r.type)}</span> ${r.date}</div>
          <div class="hint">理由：${escapeHtml(r.reason)}</div>
          ${r.status==='rejected'&&r.admin_note?`<div class="hint">却下：${escapeHtml(r.admin_note)}</div>`:''}
        </div>
        <div style="text-align:right;">
          <span class="badge badge-${r.status==='pending'?'pending':r.status==='approved'?'approved':r.status==='cancel_pending'?'pending':'rejected'}">${r.status==='pending'?'審査中':r.status==='approved'?'承認済':r.status==='cancel_pending'?'取消申請中':'却下'}</span>
          ${r.status==='pending'?`<div style="margin-top:8px;display:flex;gap:6px;">
            <button class="btn btn-green btn-sm" data-aleave="${r.id}">承認</button>
            <button class="btn btn-line btn-sm" data-rleave="${r.id}">却下</button>
          </div>`:r.status==='cancel_pending'?`<div style="margin-top:8px;display:flex;gap:6px;">
            <button class="btn btn-amber btn-sm" data-cancelapprove="${r.id}">取消承認</button>
            <button class="btn btn-line btn-sm" data-cancelreject="${r.id}">取消却下</button>
          </div>`:''}
        </div></div>`).join(''):'<div class="empty">申請・連絡はありません</div>'}
    </div>`;
    document.querySelectorAll('[data-aleave]').forEach(btn=>btn.addEventListener('click',async()=>{
      await approveLeave(btn.getAttribute('data-aleave'));showToast('承認しました');mountAdminTab();
    }));
    document.querySelectorAll('[data-rleave]').forEach(btn=>btn.addEventListener('click',async()=>{
      const note=prompt('却下理由（任意）')||'';
      await rejectLeave(btn.getAttribute('data-rleave'),note);showToast('却下しました');mountAdminTab();
    }));
    document.querySelectorAll('[data-cancelapprove]').forEach(btn=>btn.addEventListener('click',async()=>{
      await sbUpdate('leave_requests','id=eq.'+btn.getAttribute('data-cancelapprove'),{status:'cancelled'});
      logAudit('admin','cancel_leave',btn.getAttribute('data-cancelapprove'),'');
      showToast('取り消しを承認しました');mountAdminTab();
    }));
    document.querySelectorAll('[data-cancelreject]').forEach(btn=>btn.addEventListener('click',async()=>{
      await sbUpdate('leave_requests','id=eq.'+btn.getAttribute('data-cancelreject'),{status:'approved'});
      showToast('取り消しを却下しました（承認済みに戻しました）');mountAdminTab();
    }));
  }
  else if(state.adminTab==='kintai'){
    if(!state.viewMonth)state.viewMonth=new Date();
    mountAdminKintai();
  }
  else if(state.adminTab==='settings'){
    mountAdminSettings();
  }
}

/* ===== 管理者：出勤簿 ===== */
async function mountAdminKintai(){
  const body=document.getElementById('adminTabBody');if(!body)return;
  await loadHolidays();
  const vm=state.viewMonth;
  const y=vm.getFullYear(),m=vm.getMonth();
  const ym=y+'-'+p2(m+1);
  const [users,allRecords,allLeaves,settings,closings]=await Promise.all([
    getAllUsers(),
    sbFetch('attendance?deleted=eq.false&order=timestamp.desc&limit=5000'),
    getApprovedLeaves(),
    getSettings(),
    getClosings()
  ]);
  const breakTimes=parseBreakSettings(settings);
  const days=new Date(y,m+1,0).getDate();
  const closed=isClosed(closings,ym);
  const wsStd=settings.work_start||'',weStd=settings.work_end||'';
  const todayStart=new Date();todayStart.setHours(0,0,0,0);

  let html=`<div class="month-nav">
    <button class="nav" id="prevMonthA">&#9664;</button>
    <span>${y}年${m+1}月 ${closed?'<span class="badge badge-lock">🔒締め済</span>':''}</span>
    <button class="nav" id="nextMonthA">&#9654;</button>
    <button class="btn ${closed?'btn-line':'btn-amber'} btn-sm" id="toggleClose">${closed?'締め解除':'この月を締める'}</button>
    <button class="btn btn-green btn-sm" id="exportExcel" style="margin-left:auto;">Excel出力</button>
  </div>`;

  for(const u of users){
    const recs=allRecords.filter(r=>r.email===u.email&&(()=>{const d=new Date(r.timestamp);return d.getFullYear()===y&&d.getMonth()===m;})());
    const leaves=allLeaves.filter(r=>r.email===u.email);
    let rows='',totalWork=0,totalOver=0,totalNight=0;
    for(let d=1;d<=days;d++){
      const ds=y+'-'+p2(m+1)+'-'+p2(d);
      const dayStr=ds.replace(/-/g,'/');
      const dayRecs=recs.filter(r=>fmtDate(r.timestamp)===dayStr);
      const s=calcDayStats(dayRecs,breakTimes);
      const leave=leaves.find(r=>r.date===ds);
      if(s.workMin!=null){totalWork+=s.workMin;totalOver+=s.overMin;totalNight+=s.nightMin;}
      const wd=new Date(y,m,d).getDay();
      const wdStr=['日','月','火','水','木','金','土'][wd];
      const holiday=holidayMap[ds];
      const weekend=wd===0||wd===6;
      const dayColor=holiday?'color:#1a8f3c;font-weight:700;':wd===0?'color:#d43c3c;font-weight:700;':wd===6?'color:#2b6fd4;font-weight:700;':'';
      const dayDate=new Date(y,m,d);
      const miss=dayDate<todayStart&&!leave&&((s.inRec&&!s.outRec)||(!s.inRec&&s.outRec));
      let lateEarly='';
      if(wsStd&&s.inRec&&fmtTime(s.inRec.timestamp)>wsStd)lateEarly+='遅刻 ';
      if(weStd&&s.outRec&&fmtTime(s.outRec.timestamp)<weStd)lateEarly+='早退 ';
      const notes=[];
      if(s.overMin>0)notes.push('残'+fmtMin(s.overMin));
      if(s.nightMin>0)notes.push('深'+fmtMin(s.nightMin));
      if(lateEarly)notes.push(lateEarly.trim());
      if(s.inRec&&s.inRec.site)notes.push('@'+s.inRec.site);
      if(s.inRec&&s.inRec.from_reservation)notes.push('予約');
      if(miss)notes.push('打刻漏れ');
      if(holiday)notes.push(holiday);
      rows+=`<tr class="${miss?'row-miss':holiday?'row-holiday':''}" style="${weekend&&!holiday&&!miss?'color:var(--ink-soft);':''}">
        <td style="${dayColor}">${d}(${wdStr})</td>
        <td>${s.inRec?fmtTime(s.inRec.timestamp):leave?'—':''}</td>
        <td>${s.outRec?fmtTime(s.outRec.timestamp):leave?'—':''}</td>
        <td>${s.brMin>0?fmtMin(s.brMin):''}</td>
        <td>${s.workMin!=null?fmtMin(s.workMin):leave?`<span class="badge ${leave.type.startsWith('paid_leave')?'badge-confirmed':'badge-rejected'}">${leaveLabel(leave.type)}</span>`:''}</td>
        <td style="font-size:10px;">${notes.join(' ')}</td>
        <td>${closed?'':dayRecs.map(r=>`<button class="btn btn-red btn-sm" style="margin:1px;padding:3px 6px;font-size:10px;" data-admdelatt="${r.id}">${typeLabel(r.type).slice(0,1)}${fmtTime(r.timestamp)}</button>`).join('')}</td>
      </tr>`;
    }
    html+=`<div class="card" style="padding:12px;margin-bottom:12px;">
      <h3 style="margin-bottom:6px;">${escapeHtml(u.name)}<span class="hint" style="font-weight:400;margin-left:8px;">${escapeHtml(u.email)}</span>
        <span style="float:right;font-size:11.5px;color:var(--ink-soft);">実働${fmtMin(totalWork)}｜<span style="${totalOver>2700?'color:var(--red);font-weight:700;':''}">残業${fmtMin(totalOver)}</span>｜深夜${fmtMin(totalNight)}</span></h3>
      <table><thead><tr><th>日</th><th>出</th><th>退</th><th>休憩</th><th>実働</th><th>備考</th><th>削除</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }
  body.innerHTML=html;
  document.getElementById('prevMonthA').addEventListener('click',()=>{state.viewMonth=new Date(y,m-1,1);mountAdminKintai();});
  document.getElementById('nextMonthA').addEventListener('click',()=>{state.viewMonth=new Date(y,m+1,1);mountAdminKintai();});
  document.getElementById('toggleClose').addEventListener('click',async()=>{
    if(closed){
      if(!confirm(ym+' の締めを解除しますか？'))return;
      await sbFetch('closings?month=eq.'+ym,'DELETE');
      logAudit('admin','open_month',ym,'');
    }else{
      if(!confirm(ym+' を締めますか？（締め後はユーザーの修正・削除不可）'))return;
      await sbUpsert('closings',{month:ym,closed:true,closed_at:new Date().toISOString()});
      logAudit('admin','close_month',ym,'');
    }
    mountAdminKintai();
  });
  document.getElementById('exportExcel').addEventListener('click',()=>exportXlsx(users,allRecords,allLeaves,settings,breakTimes,y,m));
  document.querySelectorAll('[data-admdelatt]').forEach(btn=>btn.addEventListener('click',async()=>{
    if(!confirm('この打刻を削除しますか？'))return;
    await softDeleteAttendance(btn.getAttribute('data-admdelatt'),'admin');
    showToast('削除しました');mountAdminKintai();
  }));
}

/* ===== Excel(xlsx)出力 ===== */
function exportXlsx(users,allRecords,allLeaves,settings,breakTimes,y,m){
  const days=new Date(y,m+1,0).getDate();
  const wdStr=['日','月','火','水','木','金','土'];
  const rows=[['氏名','日付','曜日','出勤','退勤','休憩','実働','残業','深夜','現場','備考']];
  for(const u of users){
    const recs=allRecords.filter(r=>r.email===u.email&&(()=>{const d=new Date(r.timestamp);return d.getFullYear()===y&&d.getMonth()===m;})());
    const leaves=allLeaves.filter(r=>r.email===u.email);
    for(let d=1;d<=days;d++){
      const ds=y+'-'+p2(m+1)+'-'+p2(d);
      const dayStr=ds.replace(/-/g,'/');
      const dayRecs=recs.filter(r=>fmtDate(r.timestamp)===dayStr);
      const s=calcDayStats(dayRecs,breakTimes);
      const leave=leaves.find(r=>r.date===ds);
      const notes=[];
      if(s.inRec&&s.inRec.from_reservation)notes.push('予約打刻');
      if(leave)notes.push(leaveLabel(leave.type));
      if(holidayMap[ds])notes.push(holidayMap[ds]);
      rows.push([u.name,dayStr,wdStr[new Date(y,m,d).getDay()],
        s.inRec?fmtTime(s.inRec.timestamp):'',
        s.outRec?fmtTime(s.outRec.timestamp):'',
        s.brMin>0?fmtMin(s.brMin):'',
        s.workMin!=null?fmtMin(s.workMin):'',
        s.overMin>0?fmtMin(s.overMin):'',
        s.nightMin>0?fmtMin(s.nightMin):'',
        (s.inRec&&s.inRec.site)||'',
        notes.join(' ')]);
    }
  }
  if(typeof XLSX!=='undefined'){
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:12},{wch:11},{wch:4},{wch:6},{wch:6},{wch:7},{wch:8},{wch:8},{wch:8},{wch:10},{wch:16}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,`${y}年${m+1}月`);
    XLSX.writeFile(wb,`出勤簿_${y}年${m+1}月.xlsx`);
  }else{
    const csv='\uFEFF'+rows.map(r=>r.map(c=>'"'+String(c)+'"').join(',')).join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
    a.download=`出勤簿_${y}年${m+1}月.csv`;a.click();
  }
}

/* ===== 管理者：設定 ===== */
async function mountAdminSettings(){

    getAllSites(),getSettings(),getClosings(),
    sbFetch('audit_logs?order=created_at.desc&limit=50').catch(()=>[])

  body.innerHTML=`
    <div class="card"><h2>現場管理</h2>
      ${sites.map(s=>`<div class="rec-row"><div>${escapeHtml(s.name)}${s.active?'':' <span class="badge badge-rejected">無効</span>'}</div>
        <div style="display:flex;gap:6px;">
          <button class="btn ${s.active?'btn-red':'btn-green'} btn-sm" data-togglesite="${s.id}|${s.active?'0':'1'}">${s.active?'無効化':'有効化'}</button>
          <button class="btn btn-red btn-sm" data-deletesite="${s.id}">削除</button>
        </div></div>`).join('')||'<div class="empty">現場未登録</div>'}
      <div style="display:flex;gap:8px;margin-top:12px;">
        <input id="newSiteName" placeholder="新しい現場名">
        <button class="btn btn-navy" id="addSite" style="white-space:nowrap;">追加</button>
      </div>
    </div>
    <div class="card"><h2>標準休憩時間</h2>
      <div class="hint">出退勤時刻から自動で差し引かれます。最大3枠まで設定できます。</div>
      <div id="breakTimesEditor">
        ${(parseBreakSettings(settings)).map((b,i)=>`<div style="display:flex;gap:8px;align-items:center;margin-top:10px;">
          <input class="bt-start" type="time" value="${b.start}" style="width:auto;flex:1;">
          <span>〜</span>
          <input class="bt-end" type="time" value="${b.end}" style="width:auto;flex:1;">
          <button class="btn btn-red btn-sm" data-rmbreak="${i}">削除</button>
        </div>`).join('')}
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-line btn-sm" id="addBreak">＋ 追加</button>
        <button class="btn btn-navy btn-sm" id="saveBreaks">保存</button>
      </div>
    </div>
    <div class="card"><h2>標準勤務時間（遅刻・早退判定）</h2>
      <div style="display:flex;gap:12px;">
        <div style="flex:1;"><label>始業</label><input id="setWorkStart" type="time" value="${settings.work_start||''}"></div>
        <div style="flex:1;"><label>終業</label><input id="setWorkEnd" type="time" value="${settings.work_end||''}"></div>
      </div>
      <button class="btn btn-navy btn-sm" id="saveHours" style="margin-top:12px;">保存</button>
    </div>
    <div class="card"><h2>ジオフェンス（打刻位置チェック）</h2>
      <div class="hint">設定すると、管理者の打刻詳細で圏外打刻に⚠が付きます（打刻自体はブロックしません）</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <div style="flex:1;min-width:100px;"><label>緯度</label><input id="setLat" value="${settings.office_lat||''}"></div>
        <div style="flex:1;min-width:100px;"><label>経度</label><input id="setLng" value="${settings.office_lng||''}"></div>
        <div style="flex:1;min-width:80px;"><label>半径(m)</label><input id="setRad" value="${settings.office_radius||''}"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-line btn-sm" id="getHereBtn">現在地を取得</button>
        <button class="btn btn-navy btn-sm" id="saveGeo">保存</button>
      </div>
    </div>
    <div class="card"><h2>締め済みの月</h2>
      ${closings.length?closings.map(c=>`<span class="badge badge-lock" style="margin:2px;">${c.month}</span>`).join(''):'<div class="empty">締め済みの月はありません（出勤簿タブから締められます）</div>'}

    <div class="card"><h2>操作ログ（直近50件）</h2>
      ${logs.length?logs.map(l=>`<div class="rec-row" style="font-size:12px;">
        <div>${escapeHtml(actionLabel[l.action]||l.action)} <span class="hint">${escapeHtml(l.actor)}${l.detail?' / '+escapeHtml(l.detail):''}</span></div>

  document.getElementById('addSite').addEventListener('click',async()=>{

  });
  document.querySelectorAll('[data-togglesite]').forEach(btn=>btn.addEventListener('click',async()=>{
    const [id,to]=btn.getAttribute('data-togglesite').split('|');

  }));
  document.querySelectorAll('[data-deletesite]').forEach(btn=>btn.addEventListener('click',async()=>{
    if(!confirm('この現場を削除しますか？'))return;
    await sbFetch('sites?id=eq.'+btn.getAttribute('data-deletesite'),'DELETE');
    showToast('削除しました');mountAdminSettings();
  }));

    const ed=document.getElementById('breakTimesEditor');
    const div=document.createElement('div');
    div.style.cssText='display:flex;gap:8px;align-items:center;margin-top:10px;';
    div.innerHTML=`<input class="bt-start" type="time" value="00:00" style="width:auto;flex:1;"><span>〜</span><input class="bt-end" type="time" value="00:30" style="width:auto;flex:1;"><button class="btn btn-red btn-sm" onclick="this.parentElement.remove()">削除</button>`;
    ed.appendChild(div);
  });
  document.getElementById('saveBreaks').addEventListener('click',async()=>{
    const starts=[...document.querySelectorAll('.bt-start')].map(el=>el.value);
    const ends=[...document.querySelectorAll('.bt-end')].map(el=>el.value);
    const times=starts.map((s,i)=>({start:s,end:ends[i]})).filter(b=>b.start&&b.end);
    await saveSetting('break_times',JSON.stringify(times));
    showToast('休憩時間を保存しました');
  });
  document.querySelectorAll('[data-rmbreak]').forEach(btn=>btn.addEventListener('click',()=>btn.parentElement.remove()));
  document.getElementById('saveHours').addEventListener('click',async()=>{
    await saveSetting('work_start',document.getElementById('setWorkStart').value);
    await saveSetting('work_end',document.getElementById('setWorkEnd').value);
    showToast('保存しました');
  });
  document.getElementById('getHereBtn').addEventListener('click',async()=>{
    const gps=await getGPS();
    if(!gps){showToast('位置情報を取得できませんでした');return;}
    document.getElementById('setLat').value=gps.lat.toFixed(6);
    document.getElementById('setLng').value=gps.lng.toFixed(6);
    if(!document.getElementById('setRad').value)document.getElementById('setRad').value='500';
  });
  document.getElementById('saveGeo').addEventListener('click',async()=>{
    await saveSetting('office_lat',document.getElementById('setLat').value);
    await saveSetting('office_lng',document.getElementById('setLng').value);
    await saveSetting('office_radius',document.getElementById('setRad').value);
    showToast('保存しました');
  });
}

/* ===== セッション ===== */
function saveSession(user){localStorage.setItem('dezura_session',JSON.stringify({u:user,ts:Date.now()}));}
function clearSession(){localStorage.removeItem('dezura_session');}
function loadSession(){
  try{
    const v=JSON.parse(localStorage.getItem('dezura_session')||'null');
    if(!v)return null;
    if(v.u&&v.ts){
      if(Date.now()-v.ts>30*86400000){clearSession();return null;}
      return v.u;
    }
    return v.email?v:null;
  }catch(e){return null;}
}

const saved=(authGet()?loadSession():null);
if(!authGet())clearSession();
if(saved){state.view='user';state.currentUser=saved;}
render();
if(saved){mountUserTab();if(navigator.onLine)autoProcessReservations(saved.email);}
if(navigator.onLine&&authGet())syncQueue();
</script>
