<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠管理</title>

<style>
:root{
  --bg:#F5F4EF;--surface:#FFFFFF;--ink:#1C1C1A;--ink-soft:#6B675E;--line:#DEDACE;
  --navy:#173A5E;--navy-dark:#0F2740;--green:#1C7C4B;--green-dark:#145C38;
  --amber:#D9730D;--amber-dark:#B25A06;--red:#B3261E;--red-soft:#F6E4E2;--gold:#B08D3E;
  --radius:14px;
  --font-display:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  --font-body:'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;
  --font-mono:'JetBrains Mono','SF Mono',monospace;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
#root{min-height:100vh;display:flex;flex-direction:column;}
.wrap{max-width:960px;margin:0 auto;width:100%;padding:16px;}
.topbar{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700;letter-spacing:.02em;}
.brand .mark{width:auto;height:30px;padding:0 9px;border-radius:8px;background:linear-gradient(135deg,var(--amber),var(--gold));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:#1C1C1A;font-size:13px;white-space:nowrap;}
.topbar .userinfo{font-size:13px;opacity:.9;display:flex;align-items:center;gap:12px;}
.btn{border:none;border-radius:10px;padding:10px 16px;font-family:var(--font-body);font-weight:700;font-size:14px;cursor:pointer;transition:transform .08s ease,filter .15s ease;}
.btn:active{transform:scale(.97);}
.btn-ghost{background:rgba(255,255,255,.12);color:#fff;}
.btn-ghost:hover{background:rgba(255,255,255,.2);}
.btn-navy{background:var(--navy);color:#fff;}
.btn-navy:hover{background:var(--navy-dark);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:var(--green-dark);}
.btn-line{background:transparent;color:var(--navy);border:1.5px solid var(--line);}
.btn-line:hover{border-color:var(--navy);}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:8px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px;overflow-x:auto;}
.tab{padding:10px 12px;font-weight:700;font-size:13px;color:var(--ink-soft);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.tab.active{color:var(--navy);border-color:var(--amber);}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
h1,h2,h3{font-family:var(--font-display);margin:0 0 8px;}
h2{font-size:19px;}h3{font-size:15px;color:var(--ink-soft);font-weight:700;}
label{display:block;font-size:12.5px;color:var(--ink-soft);font-weight:700;margin:12px 0 5px;}
input,textarea,select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14.5px;font-family:var(--font-body);background:#fff;color:var(--ink);}
input:focus,textarea:focus,select:focus{outline:2px solid var(--navy);outline-offset:1px;border-color:var(--navy);}
.hint{font-size:12px;color:var(--ink-soft);margin-top:4px;}
.error-box{background:var(--red-soft);color:var(--red);border-radius:9px;padding:10px 12px;font-size:13px;font-weight:600;margin-top:10px;}
.center-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{max-width:420px;width:100%;}
.auth-tabs{display:flex;background:#EFEDE5;border-radius:10px;padding:4px;margin-bottom:18px;}
.auth-tab{flex:1;text-align:center;padding:9px;border-radius:7px;font-weight:700;font-size:13.5px;cursor:pointer;color:var(--ink-soft);}
.auth-tab.active{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.instrument{background:var(--navy-dark);border-radius:16px;padding:22px 20px;color:#fff;text-align:center;margin-bottom:18px;border:1px solid #0A1D33;}
.instrument .clock{font-family:var(--font-mono);font-size:44px;font-weight:700;letter-spacing:.03em;color:#F4D58D;}
.instrument .date{font-family:var(--font-mono);font-size:13px;color:#9FB4C8;margin-top:4px;letter-spacing:.08em;}
.instrument .status{margin-top:10px;font-size:13px;font-weight:700;padding:5px 12px;border-radius:20px;display:inline-block;}
.status-in{background:rgba(28,124,75,.25);color:#7FE0AB;}
.status-out{background:rgba(217,115,13,.22);color:#F5B26B;}
.offline-bar{background:#7B4F00;color:#FFE0A0;text-align:center;font-size:12.5px;font-weight:700;padding:7px;position:sticky;top:58px;z-index:19;}
.punch-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.punch-btn{border:none;border-radius:16px;padding:30px 10px;font-family:var(--font-display);font-size:22px;font-weight:900;color:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .08s ease,filter .15s ease;}
.punch-btn:active{transform:scale(.96);}
.punch-btn .sub{font-family:var(--font-mono);font-size:12px;font-weight:500;opacity:.85;}
.punch-in{background:linear-gradient(160deg,var(--green),var(--green-dark));}
.punch-out{background:linear-gradient(160deg,var(--amber),var(--amber-dark));}
.reserve-card{background:linear-gradient(135deg,#1A2E45,#0F2740);border-radius:12px;padding:14px 16px;margin-bottom:18px;color:#fff;}
.reserve-card .rc-label{font-size:11px;color:#9FB4C8;font-weight:700;letter-spacing:.06em;margin-bottom:6px;}
.reserve-card .rc-items{display:flex;flex-direction:column;gap:8px;}
.reserve-card .rc-item{display:flex;justify-content:space-between;align-items:center;font-size:14px;}
.reserve-card .rc-time{font-family:var(--font-mono);font-weight:700;color:#F4D58D;}
.reserve-card .rc-type{font-size:12px;padding:3px 8px;border-radius:12px;}
.rc-in{background:rgba(28,124,75,.3);color:#7FE0AB;}
.rc-out{background:rgba(217,115,13,.3);color:#F5B26B;}
.rec-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);font-size:14px;}
.rec-row:last-child{border-bottom:none;}
.rec-left{display:flex;align-items:center;gap:10px;}
.dot{width:9px;height:9px;border-radius:50%;}
.dot-in{background:var(--green);}
.dot-out{background:var(--amber);}
.rec-time{font-family:var(--font-mono);font-weight:700;}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.badge-pending{background:#FBEFD9;color:#8A6414;}
.badge-approved{background:#DCF0E3;color:var(--green-dark);}
.badge-rejected{background:var(--red-soft);color:var(--red);}
.badge-confirmed{background:#E5ECF3;color:var(--navy);}
.badge-offline{background:#3A2800;color:#FFD080;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy-dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:100;opacity:0;transition:opacity .25s ease;pointer-events:none;}
.toast.show{opacity:1;}
.modal-bg{position:fixed;inset:0;background:rgba(20,20,18,.5);display:flex;align-items:center;justify-content:center;z-index:60;padding:16px;}
.modal{background:#fff;border-radius:var(--radius);padding:22px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto;}
.terms-body{font-size:13.5px;line-height:1.9;color:var(--ink-soft);max-height:50vh;overflow-y:auto;padding-right:6px;}
.terms-body h4{color:var(--ink);font-size:14px;margin:14px 0 4px;}
.checkline{display:flex;align-items:flex-start;gap:8px;margin-top:14px;font-size:13px;}
.checkline input{width:auto;margin-top:3px;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;padding:8px 6px;border-bottom:1.5px solid var(--line);}
td{padding:9px 6px;border-bottom:1px solid var(--line);font-family:var(--font-mono);font-size:12.8px;}
.gps-link{color:var(--navy);font-weight:700;text-decoration:none;}
.gps-link:hover{text-decoration:underline;}
.empty{text-align:center;color:var(--ink-soft);font-size:13.5px;padding:26px 10px;}
.user-list-item{display:flex;justify-content:space-between;align-items:center;padding:13px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
.user-list-item:hover{background:#FAF9F5;}
.footer-link{text-align:center;padding:14px;font-size:12px;color:var(--ink-soft);}
.footer-link a{color:var(--navy);cursor:pointer;font-weight:700;}
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.month-nav button{background:none;border:1.5px solid var(--line);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:14px;font-weight:700;}
.month-nav span{font-family:var(--font-display);font-weight:700;font-size:16px;}
@media(max-width:520px){
  .instrument .clock{font-size:34px;}
  .punch-btn{padding:24px 8px;font-size:18px;}
}
</style>

<body>
<div id="root"></div>
<div id="toast" class="toast"></div>
<script>
/* ===== Service Worker登録 ===== */
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='dezura-v1';
const ASSETS=[location.pathname];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('supabase.co')){e.respondWith(fetch(e.request));return;}
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    const clone=res.clone();
    caches.open(CACHE).then(c=>c.put(e.request,clone));
    return res;
  })));
});`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}

/* ===== Supabase ===== */
const SB_URL='https://fzgvrropxbsxoffukhax.supabase.co';
const SB_KEY='sb_publishable_aGGnCru9be1hgd7L5-RWQg_bYdaIiNR';
const ADMIN_PASSCODE='K7mP2xQn9R';

async function sbFetch(path,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(SB_URL+'/rest/v1/'+path,opts);
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=await r.text();return t?JSON.parse(t):[];
}
async function sbInsert(table,row){return sbFetch(table,'POST',row);}
async function sbUpdate(table,filter,patch){return sbFetch(table+'?'+filter,'PATCH',patch);}

/* ===== オフラインキュー ===== */
const QUEUE_KEY='dezura_offline_queue';
function queueGet(){try{return JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]');}catch(e){return[];}}
function queueSave(q){localStorage.setItem(QUEUE_KEY,JSON.stringify(q));}
function queueAdd(item){const q=queueGet();q.push(item);queueSave(q);}
async function syncQueue(){
  const q=queueGet();if(!q.length)return;
  const failed=[];
  for(const item of q){try{await sbInsert(item.table,item.row);}catch(e){failed.push(item);}}
  queueSave(failed);
  if(failed.length<q.length)showToast('オフライン中の打刻を同期しました');
}
window.addEventListener('online',()=>{syncQueue();renderOfflineBar();});
window.addEventListener('offline',()=>renderOfflineBar());
function renderOfflineBar(){
  document.getElementById('offlineBar')?.remove();
  if(!navigator.onLine){
    const bar=document.createElement('div');
    bar.id='offlineBar';bar.className='offline-bar';
    bar.textContent='⚠ オフライン中 — 打刻はオンライン復帰後に自動送信されます';
    document.body.insertBefore(bar,document.getElementById('root').nextSibling);
  }
}

/* ===== ユーティリティ ===== */
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function p2(n){return String(n).padStart(2,'0');}
function leaveLabel(type){return{paid_leave:'有給（全日）',paid_leave_am:'有給（午前）',paid_leave_pm:'有給（午後）',absence:'欠勤（全日）',absence_am:'欠勤（午前）',absence_pm:'欠勤（午後）'}[type]||type;}
function leaveDays(type){return(type==='paid_leave'||type==='absence')?1:0.5;}
async function deleteAttendance(id){return sbFetch('attendance?id=eq.'+id,'DELETE');}
function calcWorkMin(dayRecs){
  const ins=dayRecs.filter(r=>r.type==='clock_in').sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  const outs=dayRecs.filter(r=>r.type==='clock_out').sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  if(!ins.length||!outs.length)return null;
  return Math.round((new Date(outs[outs.length-1].timestamp)-new Date(ins[0].timestamp))/60000);
}
function fmtDateTime(iso){if(!iso)return'-';const d=new Date(iso);return d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes());}
function fmtTime(iso){if(!iso)return'-';const d=new Date(iso);return p2(d.getHours())+':'+p2(d.getMinutes());}
function fmtDate(iso){if(!iso)return'-';const d=new Date(iso);return d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate());}
function toDatetimeLocal(iso){const d=new Date(iso);return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())+'T'+p2(d.getHours())+':'+p2(d.getMinutes());}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2600);}
function getGPS(){return new Promise(resolve=>{if(!navigator.geolocation){resolve(null);return;}navigator.geolocation.getCurrentPosition(p=>resolve({lat:p.coords.latitude,lng:p.coords.longitude,accuracy:Math.round(p.coords.accuracy)}),()=>resolve(null),{enableHighAccuracy:true,timeout:8000,maximumAge:0});});}

/* ===== API ===== */
async function registerUser(name,email,password){
  try{
    const ex=await sbFetch('users?email=eq.'+encodeURIComponent(email)+'&select=email');
    if(ex.length>0)return{error:'このメールアドレスは既に登録されています。'};
    await sbInsert('users',{email,name,pass:password,created_at:new Date().toISOString()});
    return{ok:true};
  }catch(e){return{error:'登録エラー: '+e.message};}
}
async function loginUser(email,password){
  try{
    const rows=await sbFetch('users?email=eq.'+encodeURIComponent(email)+'&pass=eq.'+encodeURIComponent(password)+'&select=email,name');
    if(!rows.length)return{error:'メールアドレスまたはパスワードが違います。'};
    return{ok:true,user:rows[0]};
  }catch(e){return{error:'ログインエラー: '+e.message};}
}
async function punch(email,type){
  const gps=await getGPS();
  const row={id:genId(),email,type,timestamp:new Date().toISOString(),gps_lat:gps?gps.lat:null,gps_lng:gps?gps.lng:null,gps_accuracy:gps?gps.accuracy:null,corrected:false};
  if(navigator.onLine){await sbInsert('attendance',row);}
  else{queueAdd({table:'attendance',row});}
  return row;
}
async function getAttendance(email){try{return await sbFetch('attendance?email=eq.'+encodeURIComponent(email)+'&order=timestamp.desc');}catch(e){return[];}}
async function getAllUsers(){try{return await sbFetch('users?select=email,name&order=created_at.asc');}catch(e){return[];}}
async function submitCorrection(email,recordId,type,oldTime,requestedTime,reason){
  await sbInsert('corrections',{id:genId(),email,record_id:recordId,type,old_time:oldTime,requested_time:requestedTime,reason,status:'pending',admin_note:'',created_at:new Date().toISOString()});
}
async function getCorrections(email){try{return await sbFetch('corrections?email=eq.'+encodeURIComponent(email)+'&order=created_at.desc');}catch(e){return[];}}
async function getAllCorrections(){try{return await sbFetch('corrections?order=created_at.desc');}catch(e){return[];}}
async function approveCorrection(id,recordId,requestedTime){
  await sbUpdate('corrections','id=eq.'+id,{status:'approved'});
  await sbUpdate('attendance','id=eq.'+recordId,{timestamp:requestedTime,corrected:true});
}
async function rejectCorrection(id,note){await sbUpdate('corrections','id=eq.'+id,{status:'rejected',admin_note:note||''});}
async function submitReservation(email,type,scheduledTime,reason){
  await sbInsert('reservations',{id:genId(),email,type,scheduled_time:scheduledTime,reason,status:'registered',created_at:new Date().toISOString()});
}
async function getReservations(email){try{return await sbFetch('reservations?email=eq.'+encodeURIComponent(email)+'&order=scheduled_time.asc');}catch(e){return[];}}
async function deleteReservation(id){return sbFetch('reservations?id=eq.'+id,'DELETE');}
async function getAllReservations(){try{return await sbFetch('reservations?order=created_at.desc');}catch(e){return[];}}

/* ===== 予約自動打刻チェック ===== */
async function checkAndFireReservations(email){
  const now=new Date();
  const reservations=await getReservations(email);
  const pending=reservations.filter(r=>r.status==='registered'&&new Date(r.scheduled_time)<=now);
  for(const r of pending){
    // 予約由来フラグ付きで打刻
    const gps=null; // 予約打刻はGPS不要
    const row={id:genId(),email,type:r.type,timestamp:r.scheduled_time,gps_lat:null,gps_lng:null,gps_accuracy:null,corrected:false,from_reservation:true};
    try{
      await sbInsert('attendance',row);
      await sbUpdate('reservations','id=eq.'+r.id,{status:'fired'});
    }catch(e){}
  }
  return pending.length;
}
async function submitLeaveRequest(email,type,date,reason){
  await sbInsert('leave_requests',{id:genId(),email,type,date,reason,status:'pending',admin_note:'',created_at:new Date().toISOString()});
}
async function getLeaveRequests(email){try{return await sbFetch('leave_requests?email=eq.'+encodeURIComponent(email)+'&order=date.desc');}catch(e){return[];}}
async function getAllLeaveRequests(){try{return await sbFetch('leave_requests?order=created_at.desc');}catch(e){return[];}}
async function approveLeave(id){await sbUpdate('leave_requests','id=eq.'+id,{status:'approved'});}
async function rejectLeave(id,note){await sbUpdate('leave_requests','id=eq.'+id,{status:'rejected',admin_note:note||''});}

/* ===== 状態 ===== */
let state={view:'login',currentUser:null,isAdmin:false,adminExpandedUser:null,adminTab:'users',userTab:'punch',correctionModal:null,viewMonth:new Date()};
let clockTimer=null,pollTimer=null,authTab='login';

/* ===== 認証 ===== */
function renderAuth(){return`<div class="center-screen"><div class="card auth-card">
  <div style="text-align:center;margin-bottom:18px;"><div class="brand" style="justify-content:center;color:var(--navy);"><div class="mark">でずら！</div><h1 style="font-size:20px;">勤怠管理</h1></div></div>

/* ===== イベント ===== */
function attachHandlers(){
  ['openTermsLink','openTermsLink3'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('click',openTermsModal);});
  if(state.view==='login'){
    document.querySelectorAll('[data-authtab]').forEach(el=>el.addEventListener('click',()=>{authTab=el.getAttribute('data-authtab');render();}));
    const loginBtn=document.getElementById('loginBtn');
    if(loginBtn)loginBtn.addEventListener('click',async()=>{
      const email=document.getElementById('loginEmail').value.trim();
      const pass=document.getElementById('loginPass').value;
      if(!email||!pass){showAuthErr('入力してください。');return;}
      loginBtn.disabled=true;loginBtn.textContent='確認中...';
      const r=await loginUser(email,pass);
      loginBtn.disabled=false;loginBtn.textContent='ログイン';
      if(r.error)showAuthErr(r.error);
      else{state.view='user';state.currentUser=r.user;state.userTab='punch';saveSession(r.user);render();mountUserTab();}
    });
    const regBtn=document.getElementById('registerBtn');
    if(regBtn)regBtn.addEventListener('click',async()=>{
      const name=document.getElementById('regName').value.trim();
      const email=document.getElementById('regEmail').value.trim();
      const p1=document.getElementById('regPass').value;
      const p2v=document.getElementById('regPass2').value;
      const agree=document.getElementById('agreeCheck').checked;
      const showErr=msg=>{let eb=document.getElementById('authErrorBox');if(!eb){eb=document.createElement('div');eb.id='authErrorBox';eb.className='error-box';document.getElementById('registerBtn').after(eb);}eb.textContent=msg;};
      if(!name||!email||!p1){showErr('すべての項目を入力してください。');return;}
      if(p1!==p2v){showErr('パスワードが一致しません。');return;}
      if(!agree){showErr('利用規約への同意が必要です。');return;}
      regBtn.disabled=true;regBtn.textContent='登録中...';
      const r=await registerUser(name,email,p1);
      regBtn.disabled=false;regBtn.textContent='登録する';
      if(r.error)showErr(r.error);
      else{authTab='login';render();showToast('登録が完了しました。ログインしてください。');}
    });
    const adminBtn=document.getElementById('adminLoginBtn');
    if(adminBtn)adminBtn.addEventListener('click',()=>{
      const pass=document.getElementById('adminPass').value;
      if(pass===ADMIN_PASSCODE){state.view='admin';state.isAdmin=true;render();mountAdminTab();startPoll();}
      else showAuthErr('パスコードが違います。');
    });
  }
  if(state.view==='user'){
    document.getElementById('logoutBtn').addEventListener('click',()=>{stopPoll();clearSession();state.view='login';state.currentUser=null;render();});
    document.querySelectorAll('[data-utab]').forEach(el=>el.addEventListener('click',()=>{state.userTab=el.getAttribute('data-utab');render();mountUserTab();}));
    mountUserTab();
  }
  if(state.view==='admin'){
    document.getElementById('adminLogoutBtn').addEventListener('click',()=>{stopPoll();state.view='login';state.isAdmin=false;render();});
    document.getElementById('adminRefreshBtn').addEventListener('click',()=>mountAdminTab());
    document.querySelectorAll('[data-atab]').forEach(el=>el.addEventListener('click',()=>{state.adminTab=el.getAttribute('data-atab');render();}));
    mountAdminTab();
  }
}
function showAuthErr(msg){let eb=document.getElementById('authErrorBox');if(!eb){eb=document.createElement('div');eb.id='authErrorBox';eb.className='error-box';const btn=document.getElementById('loginBtn')||document.getElementById('adminLoginBtn');if(btn)btn.after(eb);else document.querySelector('.auth-card').appendChild(eb);}eb.textContent=msg;}

/* ===== ユーザータブ ===== */
async function mountUserTab(){

    const todays=records.filter(r=>new Date(r.timestamp).toDateString()===today).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));

      <div class="card"><h2>予約一覧</h2>

async function doPunch(type){
  const btn=document.getElementById(type==='clock_in'?'punchIn':'punchOut');
  if(btn)btn.disabled=true;
  const rec=await punch(state.currentUser.email,type);
  if(navigator.onLine)showToast((type==='clock_in'?'出勤':'退勤')+'を記録しました　'+fmtTime(rec.timestamp));
  mountUserTab();
}

function tickClock(){
  function upd(){
    const el=document.getElementById('liveClock');const dl=document.getElementById('liveDate');
    if(!el){clearInterval(clockTimer);clockTimer=null;return;}
    const d=new Date();
    el.textContent=p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds());
    const days=['日','月','火','水','木','金','土'];
    dl.textContent=d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate())+'（'+days[d.getDay()]+'）';
  }
  upd();clockTimer=setInterval(upd,1000);
}

  bg.innerHTML=`<div class="modal"><h2>打刻の修正依頼</h2>

  document.getElementById('corCancel').addEventListener('click',()=>{state.correctionModal=null;bg.remove();});
  document.getElementById('corSubmit').addEventListener('click',async()=>{
    const time=document.getElementById('corTime').value;
    const reason=document.getElementById('corReason').value.trim();
    if(!time||!reason){showToast('日時と理由を入力してください');return;}
    await submitCorrection(state.currentUser.email,m.recordId,m.type,m.oldTime,new Date(time).toISOString(),reason);
    state.correctionModal=null;bg.remove();showToast('修正依頼を送信しました');mountUserTab();
  });
}

/* ===== 管理者タブ ===== */
function startPoll(){stopPoll();pollTimer=setInterval(()=>{if(state.view==='admin')mountAdminTab();},15000);}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}

async function mountAdminTab(){
  const body=document.getElementById('adminTabBody');if(!body)return;
  if(state.adminTab==='users'){
    const users=await getAllUsers();
    let expanded='';
    if(state.adminExpandedUser){
      const u=users.find(x=>x.email===state.adminExpandedUser);
      if(u){
        const records=await sbFetch('attendance?email=eq.'+encodeURIComponent(u.email)+'&order=timestamp.desc');
        expanded=`<div class="card"><h3>${escapeHtml(u.name)}（${escapeHtml(u.email)}）の打刻詳細</h3>
          <table><thead><tr><th>種別</th><th>日時</th><th>GPS座標</th><th>精度</th><th>地図</th></tr></thead><tbody>
          ${records.length?records.map(r=>`<tr>
            <td>${r.type==='clock_in'?'出勤':'退勤'}${r.corrected?' ✎':''}</td>
            <td>${fmtDateTime(r.timestamp)}</td>
            <td>${r.gps_lat!=null?r.gps_lat.toFixed(6)+', '+r.gps_lng.toFixed(6):'取得不可'}</td>
            <td>${r.gps_accuracy!=null?'±'+r.gps_accuracy+'m':'-'}</td>
            <td>${r.gps_lat!=null?`<a class="gps-link" target="_blank" href="https://maps.google.com/?q=${r.gps_lat},${r.gps_lng}">地図</a>`:'-'}</td>
          </tr>`).join(''):'<tr><td colspan="5" class="empty">記録がありません</td></tr>'}
          </tbody></table></div>`;
      }
    }
    body.innerHTML=`<div class="card"><h2>登録ユーザー（${users.length}名）</h2>
      ${users.length?users.map(u=>`<div class="user-list-item" data-adminuser="${u.email}">
        <div><strong>${escapeHtml(u.name)}</strong><div class="hint">${escapeHtml(u.email)}</div></div>
        <span class="hint">詳細を見る ›</span>
      </div>`).join(''):'<div class="empty">登録ユーザーはいません</div>'}
    </div>${expanded}`;
    document.querySelectorAll('[data-adminuser]').forEach(el=>el.addEventListener('click',()=>{state.adminExpandedUser=el.getAttribute('data-adminuser');mountAdminTab();}));
  }
  else if(state.adminTab==='corrections'){
    const [users,corrections]=await Promise.all([getAllUsers(),getAllCorrections()]);
    const um=Object.fromEntries(users.map(u=>[u.email,u.name]));
    body.innerHTML=`<div class="card"><h2>修正依頼一覧</h2>
      ${corrections.length?corrections.map(c=>`<div class="rec-row" style="align-items:flex-start;">
        <div><div><strong>${escapeHtml(um[c.email]||c.email)}</strong>　${c.type==='clock_in'?'出勤':'退勤'}</div>
          <div class="hint">${fmtDateTime(c.old_time)} → ${fmtDateTime(c.requested_time)}</div>
          <div class="hint">理由：${escapeHtml(c.reason)}</div>
          ${c.status==='rejected'&&c.admin_note?`<div class="hint">却下：${escapeHtml(c.admin_note)}</div>`:''}
        </div>
        <div style="text-align:right;">
          <span class="badge badge-${c.status==='pending'?'pending':c.status==='approved'?'approved':'rejected'}">${c.status==='pending'?'審査中':c.status==='approved'?'承認済':'却下'}</span>
          ${c.status==='pending'?`<div style="margin-top:8px;display:flex;gap:6px;">
            <button class="btn btn-green btn-sm" data-approve="${c.id}|${c.record_id}|${c.requested_time}">承認</button>
            <button class="btn btn-line btn-sm" data-reject="${c.id}">却下</button>
          </div>`:''}
        </div></div>`).join(''):'<div class="empty">修正依頼はありません</div>'}
    </div>`;
    document.querySelectorAll('[data-approve]').forEach(btn=>btn.addEventListener('click',async()=>{
      const [id,recId,reqTime]=btn.getAttribute('data-approve').split('|');
      await approveCorrection(id,recId,reqTime);showToast('承認しました');mountAdminTab();
    }));
    document.querySelectorAll('[data-reject]').forEach(btn=>btn.addEventListener('click',async()=>{
      const note=prompt('却下理由（任意）')||'';
      await rejectCorrection(btn.getAttribute('data-reject'),note);showToast('却下しました');mountAdminTab();
    }));
  }
  else if(state.adminTab==='leave'){
    const [users,requests]=await Promise.all([getAllUsers(),getAllLeaveRequests()]);
    const um=Object.fromEntries(users.map(u=>[u.email,u.name]));
    body.innerHTML=`<div class="card"><h2>有給申請・欠勤連絡 一覧</h2>
      ${requests.length?requests.map(r=>`<div class="rec-row" style="align-items:flex-start;">
        <div><div><strong>${escapeHtml(um[r.email]||r.email)}</strong>　<span class="badge ${r.type==='paid_leave'?'badge-confirmed':'badge-pending'}">${r.type==='paid_leave'?'有給':'欠勤'}</span>　${r.date}</div>
          <div class="hint">理由：${escapeHtml(r.reason)}</div>
          ${r.status==='rejected'&&r.admin_note?`<div class="hint">却下：${escapeHtml(r.admin_note)}</div>`:''}
        </div>
        <div style="text-align:right;">
          <span class="badge badge-${r.status==='pending'?'pending':r.status==='approved'?'approved':'rejected'}">${r.status==='pending'?'審査中':r.status==='approved'?'承認済':'却下'}</span>
          ${r.status==='pending'?`<div style="margin-top:8px;display:flex;gap:6px;">
            <button class="btn btn-green btn-sm" data-aleave="${r.id}">承認</button>
            <button class="btn btn-line btn-sm" data-rleave="${r.id}">却下</button>
          </div>`:''}
        </div></div>`).join(''):'<div class="empty">申請・連絡はありません</div>'}
    </div>`;
    document.querySelectorAll('[data-aleave]').forEach(btn=>btn.addEventListener('click',async()=>{
      await approveLeave(btn.getAttribute('data-aleave'));showToast('承認しました');mountAdminTab();
    }));
    document.querySelectorAll('[data-rleave]').forEach(btn=>btn.addEventListener('click',async()=>{
      const note=prompt('却下理由（任意）')||'';
      await rejectLeave(btn.getAttribute('data-rleave'),note);showToast('却下しました');mountAdminTab();
    }));
  }
  else if(state.adminTab==='kintai'){
    if(!state.viewMonth)state.viewMonth=new Date();
    mountAdminKintai();
  }
}

/* ===== 予約自動打刻 ===== */
async function autoProcessReservations(email){
  const reservations=await getReservations(email);
  const now=new Date();
  const pending=reservations.filter(r=>!r.processed&&new Date(r.scheduled_time)<=now);
  for(const r of pending){
    try{
      const gps=await getGPS();
      const row={id:genId(),email,type:r.type,timestamp:r.scheduled_time,gps_lat:gps?gps.lat:null,gps_lng:gps?gps.lng:null,gps_accuracy:gps?gps.accuracy:null,corrected:false,from_reservation:true};
      await sbInsert('attendance',row);
      await sbUpdate('reservations','id=eq.'+r.id,{processed:true});
      showToast((r.type==='clock_in'?'出勤':'退勤')+'予約を自動打刻しました　'+fmtTime(r.scheduled_time));
    }catch(e){console.error(e);}
  }
}

/* ===== 管理者カレンダー・Excel ===== */
async function mountAdminKintai(){
  const body=document.getElementById('adminTabBody');if(!body)return;
  const vm=state.viewMonth||new Date();
  const y=vm.getFullYear(),m=vm.getMonth();
  const [users,allRecords,allLeaves]=await Promise.all([
    getAllUsers(),
    sbFetch('attendance?order=timestamp.desc&limit=5000'),
    sbFetch('leave_requests?status=eq.approved&order=date.asc')
  ]);
  const days=new Date(y,m+1,0).getDate();

  let html=`<div class="month-nav">
    <button id="prevMonthA">&#9664;</button>
    <span>${y}年${m+1}月</span>
    <button id="nextMonthA">&#9654;</button>
    <button class="btn btn-green btn-sm" id="exportExcel" style="margin-left:auto;">Excel出力</button>
  </div>`;

  for(const u of users){
    const recs=allRecords.filter(r=>r.email===u.email&&(()=>{const d=new Date(r.timestamp);return d.getFullYear()===y&&d.getMonth()===m;})());
    const leaves=allLeaves.filter(r=>r.email===u.email);
    let rows='',totalWork=0;
    for(let d=1;d<=days;d++){
      const ds=y+'-'+p2(m+1)+'-'+p2(d);
      const dayStr=ds.replace(/-/g,'/');
      const dayRecs=recs.filter(r=>fmtDate(r.timestamp)===dayStr);
      const inRec=dayRecs.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).find(r=>r.type==='clock_in');
      const outRec=dayRecs.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).find(r=>r.type==='clock_out');
      const leave=leaves.find(r=>r.date===ds);
      const workMin=calcWorkMin(dayRecs);
      if(workMin!=null)totalWork+=workMin;
      const wd=new Date(y,m,d).getDay();
      const wdStr=['日','月','火','水','木','金','土'][wd];
      const weekend=wd===0||wd===6;
      rows+=`<tr style="${weekend?'color:var(--ink-soft);':''}">
        <td>${d}(${wdStr})</td>
        <td>${inRec?fmtTime(inRec.timestamp)+(inRec.from_reservation?'<span class="badge badge-confirmed" style="margin-left:4px;font-size:10px;">予約</span>':''):leave?'—':''}</td>
        <td>${outRec?fmtTime(outRec.timestamp)+(outRec.from_reservation?'<span class="badge badge-confirmed" style="margin-left:4px;font-size:10px;">予約</span>':''):leave?'—':''}</td>
        <td>${workMin!=null?Math.floor(workMin/60)+'h'+p2(workMin%60)+'m':leave?`<span class="badge ${leave.type.startsWith('paid_leave')?'badge-confirmed':'badge-rejected'}">${leaveLabel(leave.type)}</span>`:''}</td>
        <td>${dayRecs.map(r=>`<button class="btn btn-sm" style="background:var(--red-soft);color:var(--red);margin:1px;" data-admdelatt="${r.id}">${r.type==='clock_in'?'出':'退'}${fmtTime(r.timestamp)}</button>`).join('')}</td>
      </tr>`;
    }
    const th=Math.floor(totalWork/60),tm2=totalWork%60;
    html+=`<div class="card" style="padding:12px;margin-bottom:12px;">
      <h3 style="margin-bottom:6px;">${escapeHtml(u.name)}<span class="hint" style="font-weight:400;margin-left:8px;">${escapeHtml(u.email)}</span><span style="float:right;font-size:12px;color:var(--ink-soft);">総勤務 ${th}h${p2(tm2)}m</span></h3>
      <table><thead><tr><th>日</th><th>出勤</th><th>退勤</th><th>時間</th><th>削除</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }
  body.innerHTML=html;
  document.getElementById('prevMonthA').addEventListener('click',()=>{state.viewMonth=new Date(y,m-1,1);mountAdminKintai();});
  document.getElementById('nextMonthA').addEventListener('click',()=>{state.viewMonth=new Date(y,m+1,1);mountAdminKintai();});
  document.getElementById('exportExcel').addEventListener('click',()=>exportExcel(users,allRecords,allLeaves,y,m));
  document.querySelectorAll('[data-admdelatt]').forEach(btn=>btn.addEventListener('click',async()=>{
    if(!confirm('この打刻を削除しますか？'))return;
    await deleteAttendance(btn.getAttribute('data-admdelatt'));
    showToast('削除しました');mountAdminKintai();
  }));
}

function exportExcel(users,allRecords,allLeaves,y,m){
  const days=new Date(y,m+1,0).getDate();
  const BOM='\uFEFF';
  let csv=BOM+'氏名,日付,曜日,出勤,退勤,勤務時間,備考\n';
  const wdStr=['日','月','火','水','木','金','土'];
  for(const u of users){
    const recs=allRecords.filter(r=>r.email===u.email&&(()=>{const d=new Date(r.timestamp);return d.getFullYear()===y&&d.getMonth()===m;})());
    const leaves=allLeaves.filter(r=>r.email===u.email);
    for(let d=1;d<=days;d++){
      const ds=y+'-'+p2(m+1)+'-'+p2(d);
      const dayStr=ds.replace(/-/g,'/');
      const dayRecs=recs.filter(r=>fmtDate(r.timestamp)===dayStr);
      const inRec=dayRecs.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).find(r=>r.type==='clock_in');
      const outRec=dayRecs.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).find(r=>r.type==='clock_out');
      const leave=leaves.find(r=>r.date===ds);
      const wm=calcWorkMin(dayRecs);
      const workStr=wm!=null?Math.floor(wm/60)+'h'+p2(wm%60)+'m':'';
      let note='';
      if(inRec?.from_reservation||outRec?.from_reservation)note='予約打刻';
      if(leave)note=leaveLabel(leave.type);
      const wd=new Date(y,m,d).getDay();
      csv+=`"${u.name}","${dayStr}","${wdStr[wd]}","${inRec?fmtTime(inRec.timestamp):''}","${outRec?fmtTime(outRec.timestamp):''}","${workStr}","${note}"\n`;
    }
  }
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`出勤簿_${y}年${m+1}月.csv`;
  a.click();
}

/* ===== セッション ===== */
function saveSession(user){localStorage.setItem('dezura_session',JSON.stringify(user));}
function clearSession(){localStorage.removeItem('dezura_session');}
function loadSession(){try{const v=localStorage.getItem('dezura_session');return v?JSON.parse(v):null;}catch(e){return null;}}

const saved=loadSession();
if(saved){state.view='user';state.currentUser=saved;}
render();
if(saved)mountUserTab();
if(navigator.onLine)syncQueue();
if(saved&&navigator.onLine)autoProcessReservations(saved.email);
</script>
